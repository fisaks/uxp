services:
    db-server:
        image: mysql:8.0
        hostname: uxp-db
        env_file:
            - ./.env.dev
        volumes:
            - db_dev_data:/var/lib/mysql
            - ./database/:/uxp-initdb/
        networks:
            - uxp-network
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5
        command: >
            sh -c "/uxp-initdb/generate-init-scripts.sh && /uxp-initdb/run-sql-scripts.sh & docker-entrypoint.sh mysqld"

    mqtt:
        image: eclipse-mosquitto:2
        container_name: uxp-mqtt
        restart: unless-stopped
        ports: ["2883:1883"]
        volumes:
            - ./mosquitto/config:/mosquitto/config:ro
            - ./mosquitto/data:/mosquitto/data
            - ./mosquitto/log:/mosquitto/log
        command: ["mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]

    dev-https:
        image: nginx:alpine
        container_name: uxp-dev-https
        ports:
            - "3443:443"
        volumes:
            - ./nginx/nginx-dev-https.conf:/etc/nginx/conf.d/default.conf:ro
            - ./nginx/dev-certs:/etc/nginx/certs:ro
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    db_dev_data:

networks:
    uxp-network:
        driver: bridge
