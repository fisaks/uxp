services:
    db-server:
        env_file:
            - ./.env.dev
        volumes:
            - db_dev_data:/var/lib/mysql
            - ./database/:/uxp-initdb/

    dev-https:
        image: nginx:alpine
        container_name: uxp-dev-https
        ports:
            - "3443:443"
        volumes:
            - ./nginx/nginx-dev-https.conf:/etc/nginx/conf.d/default.conf:ro
            - ./nginx/dev-certs:/etc/nginx/certs:ro
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    db_dev_data:
